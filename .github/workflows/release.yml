name: Release Artifacts

on:
  push:
    tags: ['v*', '[0-9]*']
  workflow_dispatch:
    inputs:
      version:
        description: Release version label
        required: true
        type: string
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/release.yml'
      - '.github/scripts/build-release-artifacts.sh'
      - '.github/scripts/check-release-artifact-bindings.sh'
      - '.github/scripts/smoke-lattice-node.sh'
      - 'scripts/build-release-binaries.sh'
      - 'scripts/install-linux-build-dependencies.sh'
      - 'scripts/reproducible-build.sh'
      - 'docs/release-verification.md'
      - 'docs/reproducible-builds.md'

permissions:
  contents: read

jobs:
  build-linux-release-artifacts:
    runs-on: ubuntu-latest
    container: swift@sha256:f5697100d3e66326314fb63a393b1dea2eb694fdcab689b03abc5b50b514ef6e
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Linux dependencies
        run: LATTICE_RELEASE_CONTAINER=1 bash scripts/install-linux-build-dependencies.sh

      - name: Run tests before packaging
        run: swift test

      - name: Build release artifacts from canonical source path
        id: build
        env:
          RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.version || github.sha }}
          RELEASE_PLATFORM: linux-amd64
        run: |
          set -euo pipefail
          source_epoch="$(git log -1 --format=%ct)"
          staging_root=/workspace/lattice-node
          rm -rf "$staging_root"
          mkdir -p "$staging_root"
          git archive --format=tar HEAD | tar -xf - -C "$staging_root"
          cd "$staging_root"
          RELEASE_OUT_DIR="$GITHUB_WORKSPACE/.build/release-artifacts" \
            SOURCE_DATE_EPOCH="$source_epoch" \
            .github/scripts/build-release-artifacts.sh

      - name: Run archived-node multichain E2E
        env:
          ARCHIVE_PATH: ${{ steps.build.outputs.archive_path }}
        run: |
          set -euo pipefail
          archive_name="$(basename "$ARCHIVE_PATH")"
          bundle_name="${archive_name%.tar.gz}"
          extract_root="$(mktemp -d)"
          trap 'rm -rf "$extract_root"' EXIT
          tar -xzf "$ARCHIVE_PATH" -C "$extract_root"
          E2E_NODE_BIN="$extract_root/$bundle_name/bin/lattice-node" \
            E2E_COORDINATOR_BIN="$extract_root/$bundle_name/bin/lattice-mining-coordinator" \
            E2E_MINER_BIN="$extract_root/$bundle_name/bin/lattice-miner" \
            swift test --filter LatticeNodeE2ETests

      - name: Verify release artifact bindings
        run: .github/scripts/check-release-artifact-bindings.sh --self-test "${{ steps.build.outputs.manifest_path }}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lattice-node-linux-amd64-release-artifacts
          path: |
            ${{ steps.build.outputs.archive_path }}
            ${{ steps.build.outputs.checksum_path }}
            ${{ steps.build.outputs.sbom_path }}
            ${{ steps.build.outputs.manifest_path }}
          if-no-files-found: error

      - name: Attest release archive provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: ${{ steps.build.outputs.archive_path }}

      - name: Attest release SBOM
        if: github.event_name != 'pull_request'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: ${{ steps.build.outputs.archive_path }}
          sbom-path: ${{ steps.build.outputs.sbom_path }}

  build-macos-release-artifacts:
    runs-on: macos-15
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Verify jq
        run: jq --version

      - name: Run tests before packaging
        run: swift test

      - name: Build release artifacts
        id: build
        env:
          RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.version || github.sha }}
          RELEASE_PLATFORM: macos-arm64
        run: .github/scripts/build-release-artifacts.sh

      - name: Run archived-node multichain E2E
        env:
          ARCHIVE_PATH: ${{ steps.build.outputs.archive_path }}
        run: |
          set -euo pipefail
          archive_name="$(basename "$ARCHIVE_PATH")"
          bundle_name="${archive_name%.tar.gz}"
          extract_root="$(mktemp -d)"
          trap 'rm -rf "$extract_root"' EXIT
          tar -xzf "$ARCHIVE_PATH" -C "$extract_root"
          E2E_NODE_BIN="$extract_root/$bundle_name/bin/lattice-node" \
            E2E_COORDINATOR_BIN="$extract_root/$bundle_name/bin/lattice-mining-coordinator" \
            E2E_MINER_BIN="$extract_root/$bundle_name/bin/lattice-miner" \
            swift test --filter LatticeNodeE2ETests

      - name: Verify release artifact bindings
        run: .github/scripts/check-release-artifact-bindings.sh --self-test "${{ steps.build.outputs.manifest_path }}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lattice-node-macos-arm64-release-artifacts
          path: |
            ${{ steps.build.outputs.archive_path }}
            ${{ steps.build.outputs.checksum_path }}
            ${{ steps.build.outputs.sbom_path }}
            ${{ steps.build.outputs.manifest_path }}
          if-no-files-found: error

      - name: Attest release archive provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: ${{ steps.build.outputs.archive_path }}

      - name: Attest release SBOM
        if: github.event_name != 'pull_request'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: ${{ steps.build.outputs.archive_path }}
          sbom-path: ${{ steps.build.outputs.sbom_path }}

  smoke-linux-release-without-swift:
    needs: build-linux-release-artifacts
    runs-on: ubuntu-latest
    container: ubuntu:24.04
    timeout-minutes: 10
    steps:
      - name: Install runtime dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates gzip libc-bin libsqlite3-0 tar

      - name: Download Linux release archive
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: lattice-node-linux-amd64-release-artifacts
          path: release-artifacts

      - name: Run executables without a Swift toolchain
        shell: bash
        run: |
          set -euo pipefail
          archive="$(find release-artifacts -maxdepth 1 -name '*.tar.gz' -type f -print -quit)"
          [[ -n "$archive" ]]
          extract_root="$(mktemp -d)"
          trap 'rm -rf "$extract_root"' EXIT
          tar -xzf "$archive" -C "$extract_root"
          for binary in "$extract_root"/*/bin/*; do
            if ldd "$binary" | grep -q 'libswift'; then
              echo "$binary still requires a dynamic Swift runtime" >&2
              exit 1
            fi
            "$binary" --help >/dev/null
          done

  reproducible-build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify reproducible release binaries
        run: scripts/reproducible-build.sh

  publish-release:
    needs:
      - build-linux-release-artifacts
      - build-macos-release-artifacts
      - smoke-linux-release-without-swift
      - reproducible-build-linux
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}

      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Verify downloaded release artifacts
        run: .github/scripts/check-release-artifact-bindings.sh release-artifacts/*.artifacts.json

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          tag_ref="refs/tags/$TAG"
          remote_commit="$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" \
            "$tag_ref" "${tag_ref}^{}" | awk -v ref="$tag_ref" '
              $2 == ref { direct = $1 }
              $2 == ref "^{}" { peeled = $1 }
              END { if (length(peeled)) print peeled; else print direct }
            ')
          if [[ "$remote_commit" != "$GITHUB_SHA" ]]; then
            echo "tag no longer resolves to this workflow commit: $TAG" >&2
            exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "refusing to modify existing release: $TAG" >&2
            exit 1
          fi
          gh release create "$TAG" --verify-tag \
            --title "$TAG" \
            --notes "Lattice Node $TAG release artifacts." \
            release-artifacts/*
