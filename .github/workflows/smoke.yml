name: Smoke Tests

on:
  merge_group:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: macos-26
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: network-core
            workers: 1
            tags: network-core
          - name: network-heavy
            workers: 1
            tags: network-heavy
            timeout_scale: 4
          - name: follower
            workers: 2
            tags: follower
          - name: persistence
            workers: 2
            tags: persistence
          - name: swap
            workers: 2
            tags: swap
          - name: safety-a
            workers: 2
            tags: safety-a
          - name: safety-b
            workers: 2
            tags: safety-b
          - name: rpc
            workers: 4
            tags: rpc
          - name: liveness
            workers: 1
            tags: liveness
          - name: adversarial
            workers: 2
            tags: adversarial

    steps:
      - uses: actions/checkout@v4


      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-smoke-macos-${{ hashFiles('Package.resolved') }}

      - name: Build smoke binaries
        run: |
          swift build --product LatticeNode
          swift build --product LatticeMiningCoordinatorTool
          swift build --product LatticeProofVerifier

      - name: Install smoke dependencies
        working-directory: SmokeTests
        run: npm ci

      - name: Run smoke group
        working-directory: SmokeTests
        env:
          SMOKE_FAIL_FAST: "1"
          SMOKE_WORKERS: ${{ matrix.workers }}
          SMOKE_HEAVY_CONCURRENCY: "1"
          SMOKE_TIMEOUT_SCALE: ${{ matrix.timeout_scale || '4' }}
          SMOKE_TAGS: ${{ matrix.tags }}
          SMOKE_DURATION_MIN: ${{ github.event_name == 'pull_request' && '5' || '30' }}
        run: npm run all
