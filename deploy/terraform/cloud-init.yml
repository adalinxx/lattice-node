#cloud-config

package_update: true

packages:
  - curl
  - docker.io

runcmd:
  - systemctl enable --now docker
  - mkdir -p /var/lib/lattice/chains/Nexus /var/lib/lattice/identity
  - chown -R 1000:1000 /var/lib/lattice
  - docker pull ${docker_image}

  - |
    docker run -d \
      --name lattice-node \
      --restart unless-stopped \
      --network host \
      -v /var/lib/lattice:/var/lib/lattice \
      ${docker_image} \
      lattice-node \
      --chain-path Nexus \
      --data-directory /var/lib/lattice/chains/Nexus \
      --identity-key /var/lib/lattice/identity/nexus.key \
      --listen-port ${p2p_port} \
      --fact-listen-port 4002 \
      --rpc-port 8080 \
      --minimum-peer-key-bits 0

  - |
    docker run -d \
      --name lattice-mining-coordinator \
      --restart unless-stopped \
      --network host \
      ${docker_image} \
      lattice-mining-coordinator \
      --node http://127.0.0.1:8080 \
      --worker-executable /usr/local/bin/lattice-miner \
      --workers 2 \
      --batch-size 10000

  - |
    cat > /usr/local/bin/lattice-update <<'SCRIPT'
    #!/bin/bash
    set -euo pipefail
    docker pull ${docker_image}
    docker rm -f lattice-mining-coordinator lattice-node 2>/dev/null || true
    docker run -d \
      --name lattice-node \
      --restart unless-stopped \
      --network host \
      -v /var/lib/lattice:/var/lib/lattice \
      ${docker_image} \
      lattice-node \
      --chain-path Nexus \
      --data-directory /var/lib/lattice/chains/Nexus \
      --identity-key /var/lib/lattice/identity/nexus.key \
      --listen-port ${p2p_port} \
      --fact-listen-port 4002 \
      --rpc-port 8080 \
      --minimum-peer-key-bits 0 \
      "$@"
    docker run -d \
      --name lattice-mining-coordinator \
      --restart unless-stopped \
      --network host \
      ${docker_image} \
      lattice-mining-coordinator \
      --node http://127.0.0.1:8080 \
      --worker-executable /usr/local/bin/lattice-miner \
      --workers 2 \
      --batch-size 10000
    SCRIPT
    chmod +x /usr/local/bin/lattice-update

  - |
    cat > /usr/local/bin/lattice-status <<'SCRIPT'
    #!/bin/bash
    set -euo pipefail
    docker ps \
      --filter name=lattice-node \
      --filter name=lattice-mining-coordinator \
      --format '{{.Names}}: {{.Status}}'
    curl --fail http://127.0.0.1:8080/health
    SCRIPT
    chmod +x /usr/local/bin/lattice-status
